# Server Configuration
server.port=58370
server.servlet.context-path=/api/v1


# Datasource Configuration
#spring.datasource.url=jdbc:postgresql://localhost:5432/authdb
spring.datasource.url=jdbc:postgresql://localhost:5431/common-service
spring.datasource.username=${DB_USERNAME:ramsharma}
spring.datasource.password=${DB_PASSWORD:995865}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-init-sql=SET TIME ZONE 'Asia/Kolkata'
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true


# Flyway Configuration
spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

# JWT Configuration
jwt.secret=${JWT_SECRET:mySecretKey123456789012345678901234567890123456789012345678901234567890}
jwt.access-token-expiration=60000
#for 15 minutes 900000
# for 1 munute 60000

jwt.refresh-token-expiration=604800000
#120000

# Logging Configuration
logging.level.com.auth.system=DEBUG
logging.level.org.springframework.security=DEBUG
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n



eureka.client.serviceUrl.defaultZone=http://eureka:password@localhost:8761/eureka
spring.application.name=auth-service
